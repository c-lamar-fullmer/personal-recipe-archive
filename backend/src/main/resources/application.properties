# Web Server Port
server.port=8080

# PostgreSQL Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/recipe_db
spring.datasource.username=topchef
spring.datasource.password=ilovecooking
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate/JPA Settings (creates tables automatically based on your Java code)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect